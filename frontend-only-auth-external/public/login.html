<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sign In — Emoji Match</title>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #0f172a;
      color: #f1f5f9;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      margin: 0;
    }
    .login-card {
      background: #1e293b;
      border: 1px solid #334155;
      border-radius: 12px;
      padding: 2.5rem;
      text-align: center;
      max-width: 380px;
      width: 100%;
    }
    .logo { font-size: 3rem; margin-bottom: 0.75rem; }
    h1 { font-size: 1.5rem; margin-bottom: 0.25rem; }
    p  { color: #94a3b8; margin-bottom: 1.5rem; font-size: 0.95rem; }
    .btn {
      display: block;
      width: 100%;
      padding: 0.75rem;
      margin-bottom: 0.75rem;
      border: none;
      border-radius: 8px;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      text-decoration: none;
      text-align: center;
      color: white;
    }
    .btn-microsoft { background: #6366f1; }
    .btn-microsoft:hover { background: #818cf8; }
    .btn-github { background: #333; }
    .btn-github:hover { background: #555; }
    .footer { margin-top: 1.5rem; font-size: 0.8rem; color: #64748b; }
  </style>
</head>
<body>
  <div class="login-card">
    <div class="logo">🧠</div>
    <h1>Emoji Match</h1>
    <p>Sign in to play</p>
    <a class="btn btn-microsoft" href="/.auth/login/aad?post_login_redirect_uri=/">
      Sign in with Microsoft
    </a>
    <a class="btn btn-github" href="/.auth/login/github?post_login_redirect_uri=/">
      Sign in with GitHub
    </a>
    <div class="footer">
      Authentication is handled by Azure Static Web Apps.
    </div>
  </div>
</body>
</html>
